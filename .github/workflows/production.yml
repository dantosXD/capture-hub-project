name: Production CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dantosxd/capture-hub-project

jobs:
  # =============================================================================
  # Job 1: Test & Lint
  # Runs on every push and PR
  # =============================================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run smoke tests
        run: >
          npm run test:run --
          src/lib/csrf.test.ts
          src/contracts/contracts.test.ts
          src/lib/platform.test.ts
          src/hooks/ux-hooks.test.ts

      - name: Generate coverage report
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # =============================================================================
  # Job 2: Build Docker Image
  # Runs only on push to master branch after tests pass
  # =============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Image size check
        shell: bash
        run: |
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          IMAGE_SIZE=$(docker images "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" --format "{{.Size}}")
          echo "Image size: $IMAGE_SIZE"
          echo "::notice::Docker image built successfully. Size: $IMAGE_SIZE"

  # =============================================================================
  # Job 3: Security Scan (Optional)
  # Scan Docker image for vulnerabilities
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    continue-on-error: true

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Job 4: Deploy to CapRover
  # Deploys the current commit after tests pass on master pushes or manual runs
  # =============================================================================
  deploy:
    name: Deploy to CapRover
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch'
    concurrency:
      group: caprover-production
      cancel-in-progress: true
    environment:
      name: production
      url: https://capturehub.sustainablegrowthlabs.com

    steps:
      - name: Validate deployment configuration
        shell: bash
        run: |
          test -n "${{ vars.CAPROVER_SERVER }}" || { echo "Missing repository variable CAPROVER_SERVER"; exit 1; }
          test -n "${{ vars.CAPROVER_APP_NAME }}" || { echo "Missing repository variable CAPROVER_APP_NAME"; exit 1; }
          test -n "${{ secrets.CAPROVER_APP_TOKEN }}" || { echo "Missing repository secret CAPROVER_APP_TOKEN"; exit 1; }

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: "${{ vars.CAPROVER_SERVER }}"
          app: "${{ vars.CAPROVER_APP_NAME }}"
          token: "${{ secrets.CAPROVER_APP_TOKEN }}"
          branch: "${{ github.ref_name }}"
