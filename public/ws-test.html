<!DOCTYPE html>
<html>
<head><title>WebSocket Test</title><style>body{font-family:Arial,sans-serif;padding:20px;}pre{background:#f5f5f5;padding:10px;border-radius:4px;}.status{padding:10px;margin:10px 0;border-radius:4px;}.connected{background:#d4edda;color:#155724;}.disconnected{background:#f8d7da;color:#721c24;}.connecting{background:#fff3cd;color:#856404;}</style></head>
<body>
<h1>WebSocket Feature Test</h1>
<div id="status" class="status connecting">Connecting...</div>
<h2>Events Log:</h2>
<div id="events"></div>
<script>
const statusDiv = document.getElementById('status');
const eventsDiv = document.getElementById('events');
const events = [];

let ws = null;

function connect() {
  log('Attempting to connect to ws://localhost:3000/ws...');
  ws = new WebSocket('ws://localhost:3000/ws');

  ws.onopen = () => {
    statusDiv.className = 'status connected';
    statusDiv.textContent = '✓ Connected to WebSocket server';
    log('WebSocket connection established', { type: 'connection' });
  };

  ws.onmessage = (event) => {
    try {
      const message = JSON.parse(event.data);
      log(`[IN] ${message.type}`, message);

      // Test sync request after receiving connected message
      if (message.type === 'connected') {
        log('Sending sync:request to test bidirectional communication', { type: 'test' });
        ws.send(JSON.stringify({ type: 'sync:request', data: {} }));
      }
    } catch (e) {
      log('Error parsing message: ' + e.message);
    }
  };

  ws.onclose = (event) => {
    statusDiv.className = 'status disconnected';
    statusDiv.textContent = '✗ Disconnected (code: ' + event.code + ')';
    log('WebSocket connection closed', { code: event.code, reason: event.reason });
  };

  ws.onerror = (error) => {
    statusDiv.className = 'status disconnected';
    statusDiv.textContent = '✗ WebSocket error';
    log('WebSocket error occurred');
  };
}

function log(msg, data) {
  const time = new Date().toLocaleTimeString();
  const text = `[${time}] ${msg}` + (data ? '\n' + JSON.stringify(data, null, 2) : '');
  events.unshift(text);
  if (events.length > 50) events.pop();
  eventsDiv.innerHTML = '<pre>' + events.join('\n\n') + '</pre>';
  console.log(msg, data || '');
}

// Start connection
connect();
</script>
</body>
</html>
