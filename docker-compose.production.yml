version: '3.8'

services:
  capture-hub:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yourname}/capture-hub:latest
    container_name: capture-hub
    ports:
      - "3000:3000"
    volumes:
      - ./prisma:/app/prisma
      - ./backups:/app/backups
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/production.db
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://yourdomain.com/ws}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - HOSTNAME=0.0.0.0
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - capture-hub-network

networks:
  capture-hub-network:
    driver: bridge
